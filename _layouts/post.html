---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {% if page.author %} • <span>{{ page.author }}</span>{% endif %}
      {% if page.tags %} •
        {% for tag in page.tags %}
          <span class="tag">#{{ tag }}</span>
        {% endfor %}
      {% endif %}
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <hr>
  <p>
    <a href="{{ '/' | relative_url }}">← Back to all posts</a>
    · <a href="https://github.com/0xnull-sec/sec-notes/blob/main/{{ page.path }}">Edit on GitHub</a>
    · <a href="https://t.me/oxnull_security">Discuss on Telegram</a>
  </p>
</article>
